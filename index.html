<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SinnerHub Store</title>

<style>
body{
  font-family:sans-serif;
  background:#0f0f0f;
  color:white;
  margin:0;
}

header{
  text-align:center;
  padding:20px;
  font-size:28px;
  color:#00f7ff;
}

.products{
  display:flex;
  justify-content:center;
  gap:20px;
  flex-wrap:wrap;
  padding:20px;
}

.card{
  background:#1a1a1a;
  padding:20px;
  border-radius:15px;
  width:220px;
  text-align:center;
}

.card button{
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#00f7ff,#ff00ff);
  color:white;
  cursor:pointer;
}

.form-box{
  text-align:center;
  padding:30px;
}

input, textarea, select{
  width:80%;
  padding:10px;
  margin:10px;
  border-radius:10px;
  border:none;
}

button.submit{
  padding:12px 25px;
  background:linear-gradient(90deg,#00f7ff,#ff00ff);
  border:none;
  border-radius:20px;
  color:white;
  cursor:pointer;
}
</style>

<script>
function selectProduct(name){
  document.getElementById("product").value = name;
  window.scrollTo(0,document.body.scrollHeight);
}

function showUPI(){
  let method = document.getElementById("payment").value;
  let upi = document.getElementById("upiBox");
  upi.style.display = (method === "Online") ? "block" : "none";
}
</script>

</head>

<body>

<header>🛒 SinnerHub Store</header>

<div class="products">

<div class="card">
<h3>T-Shirt</h3>
<p>₹499</p>
<button onclick="selectProduct('T-Shirt')">Buy</button>
</div>

<div class="card">
<h3>Perfume</h3>
<p>₹799</p>
<button onclick="selectProduct('Perfume')">Buy</button>
</div>

<div class="card">
<h3>Watch</h3>
<p>₹1299</p>
<button onclick="selectProduct('Watch')">Buy</button>
</div>

</div>

<div class="form-box">

<h2>Place Order</h2>

<form action="https://formsubmit.co/YOUR_EMAIL@gmail.com" method="POST">

<input type="text" name="name" placeholder="Your Name" required>

<input type="tel" name="phone" placeholder="Phone Number" required>

<textarea name="address" placeholder="Full Address" required></textarea>

<input type="text" id="product" name="product" placeholder="Selected Product" required>

<select name="payment" id="payment" onchange="showUPI()" required>
<option value="">Payment Method</option>
<option value="COD">Cash on Delivery</option>
<option value="Online">Online (UPI)</option>
</select>

<div id="upiBox" style="display:none;">
<p>Pay on UPI: <b>yourupi@okupi</b></p>
<input type="text" name="txn" placeholder="Enter Transaction ID">
</div>

<button class="submit">Place Order 🚀</button>

</form>

</div>

</body>
</html>
